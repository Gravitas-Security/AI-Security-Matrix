services:
  ai-matrix:
    build: .
    ports:
      - "3001:3000"
    environment:
      - ANTHROPIC_API_KEY
      - OPENAI_API_KEY
      - GOOGLE_API_KEY
      - AZURE_OPENAI_API_KEY
      - AZURE_OPENAI_ENDPOINT
      - AZURE_OPENAI_DEPLOYMENT
    volumes:
      - ./data:/app/data
      - ./public/logo.svg:/app/public/logo.svg:ro
    restart: unless-stopped
